  <body>

    <!-- Ultra-aggressive mobile video autoplay for homepage hero -->
    <script>
      // Immediate execution for homepage video
      function startVideoImmediately() {
        const vid = document.getElementById('heroVideo');
        if (vid) {
          // Force instant playback
          vid.currentTime = 0;
          vid.muted = true;
          vid.load(); // Reload the video
          vid.play().catch(() => {});
          
          // Keep trying until it plays
          const keepTrying = setInterval(() => {
            if (vid.paused) {
              vid.play().catch(() => {});
            } else {
              clearInterval(keepTrying);
            }
          }, 100);
          
          // Clear after 3 seconds
          setTimeout(() => clearInterval(keepTrying), 3000);
        }
      }
      
      // Try multiple times at different intervals
      document.addEventListener('DOMContentLoaded', startVideoImmediately);
      setTimeout(startVideoImmediately, 50);
      setTimeout(startVideoImmediately, 200);
      setTimeout(startVideoImmediately, 500);
      
      // Touch/click activation
      document.addEventListener('touchstart', startVideoImmediately, { once: true });
      document.addEventListener('click', startVideoImmediately, { once: true });
      document.addEventListener('scroll', startVideoImmediately, { once: true });
    </script>
    <!-- This is a replit script which adds a banner on the top of the page when opened in development mode outside the replit environment -->
