  <body>
    <div id="root"></div>

    <!-- Aggressive mobile video autoplay for homepage -->
    <script>
      let videoPlayAttempts = 0;
      const maxAttempts = 20;
      
      function aggressiveVideoPlay() {
        const heroVid = document.getElementById('heroVideo');
        
        if (heroVid && window.location.pathname === '/' && videoPlayAttempts < maxAttempts) {
          videoPlayAttempts++;
          
          // Force all mobile-friendly attributes
          heroVid.muted = true;
          heroVid.defaultMuted = true;
          heroVid.playsInline = true;
          heroVid.autoplay = true;
          heroVid.currentTime = 0;
          
          // Set mobile-specific properties
          heroVid.setAttribute('webkit-playsinline', 'true');
          heroVid.setAttribute('playsinline', 'true');
          
          const playPromise = heroVid.play();
          if (playPromise !== undefined) {
            playPromise.then(() => {
              console.log('Hero video playing successfully');
            }).catch((error) => {
              console.log('Video play attempt failed, retrying...', error);
              setTimeout(aggressiveVideoPlay, 25);
            });
          }
        }
      }
      
      // Immediate attempts with increasing intervals
      aggressiveVideoPlay();
      setTimeout(aggressiveVideoPlay, 1);
      setTimeout(aggressiveVideoPlay, 10);
      setTimeout(aggressiveVideoPlay, 50);
      setTimeout(aggressiveVideoPlay, 100);
      setTimeout(aggressiveVideoPlay, 200);
      setTimeout(aggressiveVideoPlay, 500);
      
      // Event-based triggers for mobile
      document.addEventListener('DOMContentLoaded', aggressiveVideoPlay);
      window.addEventListener('load', aggressiveVideoPlay);
      
      // Mobile touch events
      ['touchstart', 'touchend', 'click', 'tap'].forEach(event => {
        document.addEventListener(event, aggressiveVideoPlay, { once: true, passive: true });
      });
      
      // Keep trying until video element is found and playing
      const videoChecker = setInterval(() => {
        if (videoPlayAttempts >= maxAttempts) {
          clearInterval(videoChecker);
          return;
        }
        
        const heroVid = document.getElementById('heroVideo');
        if (heroVid && !heroVid.paused && heroVid.currentTime > 0) {
          clearInterval(videoChecker);
        } else {
          aggressiveVideoPlay();
        }
      }, 100);
      
      // Stop checking after 5 seconds
      setTimeout(() => clearInterval(videoChecker), 5000);
    </script>
