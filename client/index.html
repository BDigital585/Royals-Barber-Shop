    <meta name="theme-color" content="#1A1A1A" />
    
    <!-- Schema.org markup for LocalBusiness (Barber Shop) -->

    {

      "name": "Royals Barber Shop",
      "image": "https://www.royalsbatavia.com/logo.png",

      "openingHours": [
        "Tue 09:00-15:00",
        "Wed 09:00-17:00",
        "Thu 09:00-17:00",
        "Fri 09:00-17:00",
        "Sat 09:00-14:00"
      ],

        "https://www.facebook.com/Royalbarber585",
        "https://www.instagram.com/royalsbarbershop585"
      ],
      "priceRange": "$$",
      "paymentAccepted": "Cash, Credit Card",
      "description": "Royals Barber Shop offers premium men's haircuts, fades, tapers, and facial hair styling in Batavia, NY. Our experienced barbers provide personalized service for all types of men's hairstyles."
    }
    </script>
  </head>
  <body>
    <!-- Immediate hero video for instant mobile playback -->
    <video 
      id="instant-hero-video"
      autoplay 
      muted 
      loop 
      playsinline
      webkit-playsinline="true"
      style="position: fixed; top: 0; left: 0; width: 100vw; height: 70vh; object-fit: cover; z-index: -1; opacity: 0.7;"
      src="/superhero.mp4"
    ></video>
    
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Instant mobile hero video autoplay script -->
    <script>
      // Force instant video playback for mobile
      let instantVideoPlayed = false;
      
      function playInstantVideo() {
        if (instantVideoPlayed) return;
        
        const instantVid = document.getElementById('instant-hero-video');
        if (instantVid) {
          instantVid.muted = true;
          instantVid.currentTime = 0;
          
          const playPromise = instantVid.play();
          if (playPromise !== undefined) {
            playPromise.then(() => {
              instantVideoPlayed = true;
              // Hide the React video once this plays
              setTimeout(() => {
                const reactVid = document.getElementById('heroVideo');
                if (reactVid) {
                  reactVid.style.display = 'none';
                }
              }, 100);
            }).catch(() => {
              setTimeout(playInstantVideo, 25);
            });
          }
        }
      }
      
      // Immediate attempts
      playInstantVideo();
      setTimeout(playInstantVideo, 1);
      setTimeout(playInstantVideo, 10);
      setTimeout(playInstantVideo, 50);
      
      // Touch triggers for mobile
      ['touchstart', 'touchend', 'click'].forEach(event => {
        document.addEventListener(event, playInstantVideo, { once: true, passive: true });
      });
      
      // Keep trying until it works
      const instantCheck = setInterval(() => {
        if (instantVideoPlayed) {
          clearInterval(instantCheck);
        } else {
          playInstantVideo();
        }
      }, 100);
      
      setTimeout(() => clearInterval(instantCheck), 3000);
    </script>
    <!-- This is a replit script which adds a banner on the top of the page when opened in development mode outside the replit environment -->
    <script type="text/javascript" src="https://replit.com/public/js/replit-dev-banner.js"></script>
  </body>
</html>
