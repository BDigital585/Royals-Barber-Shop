    <!-- Optimized preloading for instant loading -->
    <link rel="preload" href="/superhero-compressed.mp4" as="video" type="video/mp4" fetchpriority="high" />
    <link rel="preload" href="/images/2page.png" as="image" fetchpriority="high" />
    
    <!-- Open Graph / Facebook Meta Tags -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://royalsbarbershop.com/" />

    <!-- Twitter Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Royals Barber Shop | Premium Men's Haircuts" />

    <meta name="twitter:image" content="/src/assets/haircuts/fades/low-skin-fade.png" />
    
    <!-- Theme Color for Browser -->
    <meta name="theme-color" content="#1A1A1A" />
    
    <!-- Schema.org markup for LocalBusiness (Barber Shop) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Barbershop",
      "name": "Royals Barber Shop",
      "image": "https://www.royalsbatavia.com/logo.png",
      "url": "https://www.royalsbatavia.com",
      "telephone": "585-536-6576",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "317 Ellicott Street",
        "addressLocality": "Batavia",
        "addressRegion": "NY",
        "postalCode": "14020",
        "addressCountry": "US"
      },
      "openingHours": [
        "Tue 09:00-15:00",
        "Wed 09:00-17:00",
        "Thu 09:00-17:00",
        "Fri 09:00-17:00",
        "Sat 09:00-14:00"
      ],
      "sameAs": [
        "https://www.facebook.com/Royalbarber585",
        "https://www.instagram.com/royalsbarbershop585"
      ],
      "priceRange": "$$",
      "paymentAccepted": "Cash, Credit Card",
      "description": "Royals Barber Shop offers premium men's haircuts, fades, tapers, and facial hair styling in Batavia, NY. Our experienced barbers provide personalized service for all types of men's hairstyles."
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Force hero video to play -->
    <script>
      function forceVideoPlay() {
        const video = document.getElementById('heroVideo');
        if (video) {
          video.muted = true;
          video.play().then(() => {
            console.log('Video is playing!');
          }).catch(err => {
            console.log('Video autoplay failed:', err);
          });
        }
      }
      
      // Try multiple times
      setTimeout(forceVideoPlay, 100);
      setTimeout(forceVideoPlay, 500);
      setTimeout(forceVideoPlay, 1000);
      setTimeout(forceVideoPlay, 2000);
      
      document.addEventListener('DOMContentLoaded', forceVideoPlay);
      document.addEventListener('click', forceVideoPlay, { once: true });
      document.addEventListener('touchstart', forceVideoPlay, { once: true });
    </script>
    <!-- This is a replit script which adds a banner on the top of the page when opened in development mode outside the replit environment -->
    <script type="text/javascript" src="https://replit.com/public/js/replit-dev-banner.js"></script>
  </body>
